services:
  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile.dev
    container_name: torrent-auth-dev
    environment:
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:-dev-only-secret-change-me-dev-only-secret}
      # Dev gets its own Google client + origin so deploying prod never
      # clobbers dev's OAuth config (and vice versa). See PROD_* in docker-compose.yml.
      - BETTER_AUTH_URL=${DEV_BETTER_AUTH_URL:-http://localhost:5173}
      - GOOGLE_CLIENT_ID=${DEV_GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${DEV_GOOGLE_CLIENT_SECRET:-}
      - BOOTSTRAP_ADMIN_EMAILS=${BOOTSTRAP_ADMIN_EMAILS:-}
      - PLEX_TOKEN_ENC_KEY=${PLEX_TOKEN_ENC_KEY:-}
      - GO_BACKEND_URL=http://backend-dev:8080
      - DATABASE_PATH=/data/auth.sqlite
      - NODE_ENV=development
      - PORT=3000
    expose:
      - "3000"
    volumes:
      - ./auth-service:/app
      - /app/node_modules
      - ./data:/data
    depends_on:
      - backend-dev

  backend-dev:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: torrent-backend-dev
    environment:
      # Running in a container → backend/utils.go uses the PROD_ env prefix
      # (detected via /.dockerenv), so the container-side names must be PROD_*.
      - PROD_APP_PORT=8080
      - PROD_TRANSMISSION_HOST=${DEV_TRANSMISSION_HOST:-host.docker.internal}
      - PROD_TRANSMISSION_PORT=${DEV_TRANSMISSION_PORT:-9091}
      - PROD_TRANSMISSION_USERNAME=${DEV_TRANSMISSION_USERNAME:-}
      - PROD_TRANSMISSION_PASSWORD=${DEV_TRANSMISSION_PASSWORD:-}
    expose:
      - "8080"
    volumes:
      - ./backend:/app
      - /:/hostfs:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend-dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: torrent-frontend-dev
    environment:
      - VITE_API_TARGET=http://auth-service:3000/
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - auth-service

networks:
  default:
    name: torrent-dev-network
    driver: bridge
