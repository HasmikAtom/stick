services:
  auth-service:
    restart: always
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    container_name: torrent-auth-prod
    environment:
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      # Prod gets its own Google client + origin (PROD_*) so deploying dev never
      # clobbers prod's OAuth config (and vice versa). See DEV_* in docker-compose.dev.yml.
      - BETTER_AUTH_URL=${PROD_BETTER_AUTH_URL}
      - GOOGLE_CLIENT_ID=${PROD_GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${PROD_GOOGLE_CLIENT_SECRET}
      - BOOTSTRAP_ADMIN_EMAILS=${BOOTSTRAP_ADMIN_EMAILS}
      - PLEX_TOKEN_ENC_KEY=${PLEX_TOKEN_ENC_KEY}
      - GO_BACKEND_URL=http://backend:8080
      - DATABASE_PATH=/data/auth.sqlite
      - NODE_ENV=production
      - PORT=3000
    ports:
      - "3000:3000"
    volumes:
      - ./data:/data
    depends_on:
      - backend

  backend:
    restart: always
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: torrent-backend-prod
    environment:
      # Running in a container → backend/utils.go uses the PROD_ env prefix
      # (detected via /.dockerenv), so the container-side names must be PROD_*.
      - PROD_APP_PORT=8080
      - PROD_TRANSMISSION_HOST=${PROD_TRANSMISSION_HOST}
      - PROD_TRANSMISSION_PORT=${PROD_TRANSMISSION_PORT}
      - PROD_TRANSMISSION_USERNAME=${PROD_TRANSMISSION_USERNAME}
      - PROD_TRANSMISSION_PASSWORD=${PROD_TRANSMISSION_PASSWORD}
    expose:
      - "8080"
    volumes:
      - /:/hostfs:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  default:
    name: torrent-network
    driver: bridge
